services:
  - type: web
    name: owox-model-canvas
    # Purely static SPA — no backend. Render serves the built web dist/ directly.
    runtime: static
    # corepack provides pnpm (version pinned via package.json "packageManager")
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: packages/web/dist
    autoDeploy: true
    # SPA fallback: every route serves index.html so client-side routing works.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
